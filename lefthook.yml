pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,mjs,json}"
      run: node scripts/ensure-node-modules.mjs && pnpm biome lint {staged_files}

pre-push:
  commands:
    typecheck:
      run: node scripts/ensure-node-modules.mjs && pnpm typecheck
    test:
      # Run only tests whose module graph touches files being pushed.
      # The `glob` filter lets lefthook skip the command entirely when
      # the push contains no JS/TS changes. Use `pnpm test` to run the
      # full suite manually.
      glob: "*.{ts,tsx,js,mjs,cjs}"
      run: node scripts/ensure-node-modules.mjs && pnpm vitest related {push_files} --run
