pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,mjs,json}"
      run: pnpm check:staged-lint {staged_files}

pre-push:
  commands:
    pnpm-version:
      run: |
        EXPECTED=$(node -p "require('./package.json').packageManager.split('@')[1]")
        ACTUAL=$(pnpm --version)
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "[lefthook] warning: local pnpm $ACTUAL differs from package.json packageManager=$EXPECTED — staged-lint results may diverge from CI" >&2
        fi
    fast-check:
      run: pnpm check:pre-push
