<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coflat Embeddable Editor Demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        padding: 2rem;
        max-width: 860px;
        margin: 0 auto;
        color: #18181b;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }

      .subtitle {
        color: #71717a;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
      }

      .toolbar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .toolbar button {
        padding: 4px 12px;
        border: 1px solid #e4e4e7;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0.8rem;
      }

      .toolbar button:hover {
        background: #f4f4f5;
      }

      .toolbar button.active {
        background: #18181b;
        color: #fff;
        border-color: #18181b;
      }

      .editor-container {
        border: 1px solid #e4e4e7;
        border-radius: 4px;
        height: 420px;
        overflow: hidden;
        background: #fff;
      }

      .editor-container .cm-editor {
        height: 100%;
      }

      .editor-container .cm-scroller {
        overflow: auto;
      }

      .log {
        margin-top: 1.5rem;
      }

      .log h2 {
        font-size: 0.85rem;
        color: #71717a;
        margin-bottom: 0.5rem;
      }

      .log pre {
        background: #18181b;
        color: #a1a1aa;
        padding: 1rem;
        border-radius: 4px;
        font-size: 0.8rem;
        line-height: 1.5;
        max-height: 140px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h1>Coflat Embeddable Editor</h1>
    <p class="subtitle">
      Minimal demo of the standalone
      <code>mountEditor</code> API.
    </p>

    <div class="toolbar">
      <button id="mode-rich" class="active">Rich</button>
      <button id="mode-source">Source</button>
      <button id="get-doc">getDoc()</button>
    </div>
    <div id="editor" class="editor-container"></div>

    <div class="log">
      <h2>Callback log</h2>
      <pre id="log-output"></pre>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
