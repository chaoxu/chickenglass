name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint, typecheck, dead-code ──────────────────────────────────
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:boundaries
      - run: pnpm typecheck
      - run: pnpm typecheck:server
      - run: pnpm knip

  # ── Frontend: unit tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Pandoc
        run: |
          if command -v pandoc >/dev/null 2>&1; then
            pandoc --version
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pandoc
          elif command -v brew >/dev/null 2>&1; then
            brew install pandoc
          else
            echo "Pandoc is required but neither apt-get nor brew is available." >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          REQUIRE_PANDOC: "1"

  # ── Production app: build + required browser subset ───────────────────────
  merged-app-browser:
    name: Production app browser subset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build:app
      - name: Run merged-app browser subset
        run: |
          pnpm exec vite preview --host 127.0.0.1 --port 4173 --strictPort > /tmp/coflats-preview.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4173 >/dev/null
          pnpm test:browser:merged-app -- --url http://127.0.0.1:4173 --browser managed --timeout 30000
          pnpm test:browser:lexical -- --url http://127.0.0.1:4173 --browser managed --timeout 30000

  # ── Standalone package: build + publint + size-limit ─────────────────────
  package:
    name: Editor package
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:editor
      - run: pnpm publint
      - run: pnpm size
      - run: pnpm smoke:editor-package

  # ── Rust / Tauri backend ──────────────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml
