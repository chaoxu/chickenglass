name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint, typecheck, dead-code ──────────────────────────────────
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:boundaries
      - run: pnpm typecheck
      - run: pnpm knip

  # ── Frontend: unit tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # ── Coflat 2: browser smoke for the Lexical WYSIWYG product ───────────────
  coflat2-smoke:
    name: Coflat 2 browser smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run Coflat 2 smoke
        run: |
          VITE_COFLAT_PRODUCT=coflat2 pnpm exec vite --host 127.0.0.1 --port 5173 --strictPort > /tmp/coflat2-vite.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:5173 >/dev/null
          pnpm test:browser:coflat2 -- --url http://127.0.0.1:5173 --browser managed --timeout 30000

  # ── Standalone package: build + publint + size-limit ─────────────────────
  package:
    name: Editor package
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:editor
      - run: pnpm publint
      - run: pnpm size

  # ── Rust / Tauri backend ──────────────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml
