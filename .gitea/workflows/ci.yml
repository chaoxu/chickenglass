name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint, typecheck, unused-code/deps ───────────────────────────
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:static

  # ── Frontend: unit tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Pandoc
        run: |
          if command -v pandoc >/dev/null 2>&1; then
            pandoc --version
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pandoc
          elif command -v brew >/dev/null 2>&1; then
            brew install pandoc
          else
            echo "Pandoc is required but neither apt-get nor brew is available." >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:unit
        env:
          REQUIRE_PANDOC: "1"

  # ── Production app: build + required browser subset ───────────────────────
  merged-app-browser:
    name: Production app browser subset
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
        timeout-minutes: 10
      - run: pnpm check:app-build
        timeout-minutes: 10
      - name: Run merged-app browser subset
        timeout-minutes: 20
        run: |
          set -u
          artifacts_dir=/tmp/coflat-browser-artifacts
          preview_log="$artifacts_dir/preview.log"
          mkdir -p "$artifacts_dir"

          pnpm exec vite preview --host 127.0.0.1 --port 4173 --strictPort > "$preview_log" 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:4173 >/dev/null; then
            echo "Vite preview did not become reachable. Preview log:"
            tail -200 "$preview_log" || true
            exit 1
          fi

          browser_status=0
          failing_command=""
          pnpm test:browser:merged-app -- --url http://127.0.0.1:4173 --browser managed --timeout 30000 --artifacts-dir "$artifacts_dir" || {
            browser_status=$?
            failing_command="test:browser:merged-app"
          }
          if [ "$browser_status" -eq 0 ]; then
            pnpm test:browser:lexical -- --url http://127.0.0.1:4173 --browser managed --timeout 30000 --artifacts-dir "$artifacts_dir" || {
              browser_status=$?
              failing_command="test:browser:lexical"
            }
          fi
          if [ "$browser_status" -eq 0 ]; then
            pnpm perf:capture -- --scenario open-index --iterations 1 --warmup 0 --url http://127.0.0.1:4173 --browser managed --debug-timeout-ms 30000 --artifacts-dir "$artifacts_dir" --output "$artifacts_dir/perf-open-index-baseline.json" || {
              browser_status=$?
              failing_command="perf:capture open-index baseline"
            }
          fi
          if [ "$browser_status" -eq 0 ]; then
            pnpm perf:compare -- --scenario open-index --iterations 1 --warmup 0 --url http://127.0.0.1:4173 --browser managed --debug-timeout-ms 30000 --artifacts-dir "$artifacts_dir" --baseline "$artifacts_dir/perf-open-index-baseline.json" || {
              browser_status=$?
              failing_command="perf:compare open-index"
            }
          fi

          if [ "$browser_status" -ne 0 ]; then
            echo "Browser command failed: $failing_command"
            echo "Preview log tail:"
            tail -200 "$preview_log" || true
          fi
          exit "$browser_status"
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-diagnostics
          path: /tmp/coflat-browser-artifacts
          if-no-files-found: ignore

  # ── Standalone package: build + publint + size-limit ─────────────────────
  package:
    name: Editor package
    needs: [static]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:package

  # ── Rust / Tauri backend ──────────────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml
