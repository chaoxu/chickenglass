name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint, typecheck, unused-code/deps ───────────────────────────
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        run: |
          pnpm_home="${RUNNER_TEMP:-$PWD/.tmp-ci}/pnpm"
          npm install -g --prefix "$pnpm_home" pnpm@10.33.0
          echo "$pnpm_home/bin" >> "$GITHUB_PATH"
          "$pnpm_home/bin/pnpm" --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:static

  # ── Frontend: unit tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        run: |
          pnpm_home="${RUNNER_TEMP:-$PWD/.tmp-ci}/pnpm"
          npm install -g --prefix "$pnpm_home" pnpm@10.33.0
          echo "$pnpm_home/bin" >> "$GITHUB_PATH"
          "$pnpm_home/bin/pnpm" --version
      - name: Install Pandoc
        run: |
          if command -v pandoc >/dev/null 2>&1; then
            pandoc --version
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pandoc
          elif command -v brew >/dev/null 2>&1; then
            brew install pandoc
          else
            echo "Pandoc is required but neither apt-get nor brew is available." >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:unit
        env:
          REQUIRE_PANDOC: "1"

  # ── Production app: build + required browser subset ───────────────────────
  merged-app-browser:
    name: Production app browser subset
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BROWSER_ARTIFACTS_DIR: /tmp/coflat-browser-artifacts-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        run: |
          pnpm_home="${RUNNER_TEMP:-$PWD/.tmp-ci}/pnpm"
          npm install -g --prefix "$pnpm_home" pnpm@10.33.0
          echo "$pnpm_home/bin" >> "$GITHUB_PATH"
          "$pnpm_home/bin/pnpm" --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
        timeout-minutes: 10
      - run: pnpm check:app-build
        timeout-minutes: 10
      - name: Run merged-app browser subset
        timeout-minutes: 30
        run: |
          set -u
          artifacts_dir="${BROWSER_ARTIFACTS_DIR:-/tmp/coflat-browser-artifacts-${GITHUB_RUN_ID:-local-$$}}"
          preview_log="$artifacts_dir/preview.log"
          baseline_log="$artifacts_dir/baseline-preview.log"
          baseline_dir="$artifacts_dir/baseline-worktree"
          baseline_file="$artifacts_dir/perf-open-index-baseline.json"
          run_number="${GITHUB_RUN_NUMBER:-0}"
          port_offset=$(( (run_number % 100) * 2 ))
          current_preview_port=$((4173 + port_offset))
          baseline_preview_port=$((current_preview_port + 1))
          rm -rf "$artifacts_dir"
          mkdir -p "$artifacts_dir"
          echo "Browser artifacts dir: $artifacts_dir"
          echo "Preview ports: current=$current_preview_port baseline=$baseline_preview_port"

          start_preview() {
            preview_dir="$1"
            preview_port="$2"
            preview_log_path="$3"
            (cd "$preview_dir" && pnpm exec vite preview --host 127.0.0.1 --port "$preview_port" --strictPort > "$preview_log_path" 2>&1) &
            started_preview_pid=$!
          }

          wait_for_preview() {
            preview_port="$1"
            preview_log_path="$2"
            echo "Waiting for Vite preview on port $preview_port..."
            for attempt in $(seq 1 60); do
              if curl --connect-timeout 1 --max-time 3 -fsS "http://127.0.0.1:$preview_port" >/dev/null; then
                echo "Vite preview on port $preview_port is reachable."
                return 0
              fi
              if [ $((attempt % 10)) -eq 0 ]; then
                echo "Still waiting for Vite preview on port $preview_port after ${attempt}s."
                tail -40 "$preview_log_path" || true
              fi
              sleep 1
            done
            echo "Vite preview on port $preview_port did not become reachable. Preview log:"
            tail -200 "$preview_log_path" || true
            return 1
          }

          stop_process_tree() {
            root_pid="$1"
            if [ -z "$root_pid" ] || ! kill -0 "$root_pid" 2>/dev/null; then
              return 0
            fi
            for child_pid in $(pgrep -P "$root_pid" 2>/dev/null || true); do
              stop_process_tree "$child_pid"
            done
            kill "$root_pid" 2>/dev/null || true
          }

          stop_preview() {
            preview_pid="$1"
            if [ -z "$preview_pid" ]; then
              return 0
            fi
            stop_process_tree "$preview_pid"
            wait "$preview_pid" 2>/dev/null || true
          }

          current_server_pid=""
          baseline_server_pid=""
          cleanup() {
            stop_preview "$current_server_pid"
            stop_preview "$baseline_server_pid"
          }
          trap cleanup EXIT

          baseline_ref=""
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "$GITHUB_BASE_REF" --depth=1
            baseline_ref="origin/$GITHUB_BASE_REF"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            baseline_ref="HEAD^"
          fi
          echo "Baseline ref: ${baseline_ref:-none}"

          if [ -n "$baseline_ref" ] && [ "$(git rev-parse "$baseline_ref")" != "$(git rev-parse HEAD)" ]; then
            echo "Preparing baseline worktree at $baseline_ref."
            git worktree add --detach "$baseline_dir" "$baseline_ref" || exit 1
            echo "Installing and building baseline app."
            (cd "$baseline_dir" && pnpm install --frozen-lockfile --ignore-scripts && pnpm check:app-build) || exit 1
            start_preview "$baseline_dir" "$baseline_preview_port" "$baseline_log"
            baseline_server_pid="$started_preview_pid"
            wait_for_preview "$baseline_preview_port" "$baseline_log" || exit 1
            echo "Capturing baseline open-index performance."
            pnpm perf:capture -- --scenario open-index --iterations 1 --warmup 0 --url "http://127.0.0.1:$baseline_preview_port" --browser managed --debug-timeout-ms 30000 --artifacts-dir "$artifacts_dir" --output "$baseline_file" || exit 1
            stop_preview "$baseline_server_pid"
            baseline_server_pid=""
          else
            echo "No distinct baseline ref available; CI will run perf capture only."
            baseline_file=""
          fi

          echo "Starting current app preview."
          start_preview "$PWD" "$current_preview_port" "$preview_log"
          current_server_pid="$started_preview_pid"
          wait_for_preview "$current_preview_port" "$preview_log" || exit 1

          browser_status=0
          failing_command=""
          echo "Running merged-app browser subset."
          pnpm test:browser:merged-app -- --url "http://127.0.0.1:$current_preview_port" --browser managed --timeout 30000 --artifacts-dir "$artifacts_dir" || {
            browser_status=$?
            failing_command="test:browser:merged-app"
          }
          if [ "$browser_status" -eq 0 ]; then
            echo "Running Lexical browser subset."
            pnpm test:browser:lexical -- --url "http://127.0.0.1:$current_preview_port" --browser managed --timeout 30000 --artifacts-dir "$artifacts_dir" || {
              browser_status=$?
              failing_command="test:browser:lexical"
            }
          fi
          if [ "$browser_status" -eq 0 ] && [ -n "$baseline_file" ]; then
            echo "Comparing open-index performance against $baseline_ref."
            pnpm perf:compare -- --scenario open-index --iterations 1 --warmup 0 --url "http://127.0.0.1:$current_preview_port" --browser managed --debug-timeout-ms 30000 --artifacts-dir "$artifacts_dir" --baseline "$baseline_file" || {
              browser_status=$?
              failing_command="perf:compare open-index against $baseline_ref"
            }
          elif [ "$browser_status" -eq 0 ]; then
            echo "Capturing current open-index performance."
            pnpm perf:capture -- --scenario open-index --iterations 1 --warmup 0 --url "http://127.0.0.1:$current_preview_port" --browser managed --debug-timeout-ms 30000 --artifacts-dir "$artifacts_dir" --output "$artifacts_dir/perf-open-index-current.json" || {
              browser_status=$?
              failing_command="perf:capture open-index current"
            }
          fi

          if [ "$browser_status" -ne 0 ]; then
            echo "Browser command failed: $failing_command"
            echo "Preview log tail:"
            tail -200 "$preview_log" || true
            if [ -f "$baseline_log" ]; then
              echo "Baseline preview log tail:"
              tail -200 "$baseline_log" || true
            fi
          fi
          exit "$browser_status"
      - name: Print browser diagnostics
        if: failure()
        run: |
          artifacts_dir="${BROWSER_ARTIFACTS_DIR:-/tmp/coflat-browser-artifacts-${GITHUB_RUN_ID:-local}}"
          if [ ! -d "$artifacts_dir" ]; then
            echo "No browser diagnostics directory found."
            exit 0
          fi

          echo "Browser diagnostics files:"
          find "$artifacts_dir" -maxdepth 3 -type f -print | sort

          for log_file in "$artifacts_dir"/*.log; do
            if [ -f "$log_file" ]; then
              echo ""
              echo "===== ${log_file} ====="
              tail -200 "$log_file" || true
            fi
          done

  # ── Standalone package: build + publint + size-limit ─────────────────────
  package:
    name: Editor package
    needs: [static]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        run: |
          pnpm_home="${RUNNER_TEMP:-$PWD/.tmp-ci}/pnpm"
          npm install -g --prefix "$pnpm_home" pnpm@10.33.0
          echo "$pnpm_home/bin" >> "$GITHUB_PATH"
          "$pnpm_home/bin/pnpm" --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:package

  # ── Rust / Tauri backend ──────────────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml
