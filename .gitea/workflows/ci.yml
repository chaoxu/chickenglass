name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint, typecheck, dead-code ──────────────────────────────────
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:boundaries
      - run: pnpm typecheck
      - run: pnpm typecheck:server
      - run: pnpm knip

  # ── Frontend: unit tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Pandoc
        run: |
          if command -v pandoc >/dev/null 2>&1; then
            pandoc --version
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pandoc
          elif command -v brew >/dev/null 2>&1; then
            brew install pandoc
          else
            echo "Pandoc is required but neither apt-get nor brew is available." >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          REQUIRE_PANDOC: "1"

  # ── Production app: build + required browser subset ───────────────────────
  merged-app-browser:
    name: Production app browser subset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build:app
      - name: Run merged-app browser subset
        run: |
          set -u
          artifacts_dir=/tmp/coflats-browser-artifacts
          preview_log="$artifacts_dir/preview.log"
          chrome_log="$artifacts_dir/chrome.log"
          mkdir -p "$artifacts_dir"

          pnpm exec vite preview --host 127.0.0.1 --port 4173 --strictPort > "$preview_log" 2>&1 &
          server_pid=$!
          browser_pid=""
          cleanup() {
            if [ -n "$browser_pid" ]; then
              kill "$browser_pid" 2>/dev/null || true
            fi
            kill "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:4173 >/dev/null; then
            node scripts/ci-browser-diagnostics.mjs collect --url http://127.0.0.1:4173 --out-dir "$artifacts_dir" --preview-log "$preview_log" --label preview-startup
            exit 1
          fi

          node scripts/ci-browser-diagnostics.mjs launch --url http://127.0.0.1:4173 --port 9322 --profile /tmp/coflats-ci-browser-profile > "$chrome_log" 2>&1 &
          browser_pid=$!
          if ! node scripts/ci-browser-diagnostics.mjs wait --url http://127.0.0.1:4173 --port 9322 --timeout 30000; then
            node scripts/ci-browser-diagnostics.mjs collect --url http://127.0.0.1:4173 --port 9322 --out-dir "$artifacts_dir" --preview-log "$preview_log" --label browser-startup || true
            exit 1
          fi

          browser_status=0
          failing_command=""
          pnpm test:browser:merged-app -- --url http://127.0.0.1:4173 --browser cdp --timeout 30000 || {
            browser_status=$?
            failing_command="test:browser:merged-app"
          }
          if [ "$browser_status" -eq 0 ]; then
            pnpm test:browser:lexical -- --url http://127.0.0.1:4173 --browser cdp --timeout 30000 || {
              browser_status=$?
              failing_command="test:browser:lexical"
            }
          fi
          if [ "$browser_status" -eq 0 ]; then
            pnpm perf:capture -- --scenario open-index --iterations 1 --warmup 0 --url http://127.0.0.1:4173 --browser cdp --debug-timeout-ms 30000 --output "$artifacts_dir/perf-open-index.json" || {
              browser_status=$?
              failing_command="perf:capture open-index"
            }
          fi

          if [ "$browser_status" -ne 0 ]; then
            node scripts/ci-browser-diagnostics.mjs collect --url http://127.0.0.1:4173 --port 9322 --out-dir "$artifacts_dir" --preview-log "$preview_log" --label "$failing_command" || true
          fi
          exit "$browser_status"
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-diagnostics
          path: /tmp/coflats-browser-artifacts
          if-no-files-found: ignore

  # ── Standalone package: build + publint + size-limit ─────────────────────
  package:
    name: Editor package
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:editor
      - run: pnpm publint
      - run: pnpm size
      - run: pnpm smoke:editor-package

  # ── Rust / Tauri backend ──────────────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml
