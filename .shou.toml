accept = """
Coflat2 acceptance rules. Every rule applies to the verifier, not the author.

0. Regression gate.
The full test suite must pass. Do not verify only new tests — run `pnpm test` and confirm zero failures. If carryover tests exist for the touched area, confirm round-trip fidelity.

1. Visual/editor changes.
If the change touches Lexical rendering, DecoratorNode output, node DOM, themes, CSS, or scrolling:
  - verify in the live browser on `index.md`. For long-document behavior, also verify on `fixtures/cogirth/main2.md`.
  - use the managed harness (`pnpm test:browser`, `scripts/test-helpers.mjs`) over ad-hoc browser setup.
  - for Rich/Source mode issues, confirm both modes.
  - reject manual DOM manipulation (window.getSelection, addEventListener, querySelector on editor content, element.focus()) when a Lexical-native API exists (registerCommand, $getSelection, node.select(), $getNearestNodeFromDOMNode).

2. Parser and structure changes.
If the change touches markdown transformers, custom nodes, or document structure:
  - require a Vitest test with exact document content.
  - verify markdown round-trip with carryover tests.
  - verify the tree in the live editor when incremental behavior matters.

3. Architecture and wiring.
  - new modules must have at least one non-test importer. Zero external importers = dead code, not a feature. If it's scaffolding for a follow-up, the commit message must name the issue that will wire it.
  - one concept, one owner. If the diff adds a second owner for the same state, reject.
  - for CM6→Lexical migration: confirm the old pattern is deleted, not just unused. Grep for the old imports/APIs and verify zero hits.
  - do not close on directional cleanup alone — prove the structural outcome in HEAD.

4. Desktop/Tauri.
  - run `cargo nextest run`.
  - verify with `pnpm tauri:dev` for native behavior.
  - browser-only verification is insufficient for native-only behavior.

5. Performance.
  - require before/after numbers from `pnpm perf:capture` / `pnpm perf:compare`.
  - prefer `fixtures/cogirth/main2.md`; note the limitation if using `demo/index.md`.

6. Package surface.
If the change touches editor exports or bundle shape: `pnpm build:editor`, `pnpm publint`, `pnpm size`.

7. Cleanup.
Kill any dev-server, browser, or Tauri processes you started.
"""
