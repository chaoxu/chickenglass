accept = """
Coflat2-specific acceptance rules:

1. Visual/editor changes.
If the change touches Lexical rendering, DecoratorNode output, node DOM, inline rendering, themes, CSS, geometry, mode parity, or scrolling:
  - verify in the live browser, not only with typecheck/tests.
  - open `index.md`; if the issue affects long-document behavior and local private fixtures are available, also verify on the affected heavy fixture such as `fixtures/cogirth/main2.md`.
  - prefer the repo helpers and managed harness (`pnpm test:browser`, `scripts/test-helpers.mjs`, perf harness) over ad-hoc browser setup.
  - for Rich/Source mode issues, confirm both modes behave correctly.
  - prefer Lexical-native patterns (registerCommand, $getSelection, node.select(), DecoratorNode) over manual DOM manipulation.
  - no editor CSS may change Lexical's ContentEditable layout unless the corresponding node explicitly models that structure.

2. Parser and structure changes.
If the change touches markdown transformers, custom nodes, or document structure:
  - add or update a Vitest test with the exact document content.
  - verify the tree/structure in the live editor when incremental behavior matters.
  - verify markdown round-trip fidelity with carryover tests.

3. Architecture and refactor issues.
For refactor, cleanup, or architecture tickets:
  - prove the promised structural outcome in HEAD, not just the narrative in the diff.
  - show that one concept has one owner, stale duplicate paths are removed, and any promised split/centralization actually exists now.
  - do not close on directional cleanup alone.
  - for CM6→Lexical migration work: confirm the CM6 pattern is fully removed, not just wrapped.
  - verify new modules are actually wired up: grep for imports from at least one non-test consumer. A module with zero external importers (only its own test) is dead code, not a delivered feature. If the module is intentional scaffolding for a follow-up issue, note the dependency explicitly in the commit message.

4. Desktop/Tauri-specific behavior.
If the change affects native-only behavior:
  - run `cargo nextest run`.
  - verify with `pnpm tauri:dev` for native menus/dialogs, picker flows, window lifecycle, external-link handling, filesystem integration, and other desktop-only behavior.
  - do not treat browser-only verification as sufficient.

5. Performance work.
If the issue is about performance or the change plausibly affects open/edit/scroll latency:
  - capture before/after numbers with `pnpm perf:capture` / `pnpm perf:compare` or documented perf spans.
  - prefer `fixtures/cogirth/main2.md`; otherwise use `demo/index.md` and note the limitation.
  - do not claim perf success without measurements.

6. Standalone editor/package surface.
If the change touches editor exports, standalone packaging, or bundle shape:
  - run `pnpm build:editor`.
  - run `pnpm publint`.
  - run `pnpm size`.

7. Process cleanup.
Clean up any background dev-server, browser, or Tauri processes you started.
"""
