<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chickenglass</title>
    <style>
      :root {
        --cg-bg: #ffffff;
        --cg-fg: #09090b;
        --cg-border: #d4d4d8;
        --cg-muted: #71717a;
        --cg-subtle: #f4f4f5;
        --cg-hover: #e4e4e7;
        --cg-active: #d4d4d8;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--cg-bg);
        color: var(--cg-fg);
      }

      /* App shell layout */
      .app-root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .app-main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .app-editor {
        position: relative;
        flex: 1;
        overflow: hidden;
      }

      .cm-editor {
        height: 100%;
      }

      .cm-scroller {
        overflow: auto;
      }

      /* Tab bar */
      .tab-bar {
        display: flex;
        align-items: center;
        background: var(--cg-subtle);
        border-bottom: 1px solid var(--cg-border);
        min-height: 32px;
        overflow-x: auto;
        flex-shrink: 0;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 12px;
        font-size: 13px;
        cursor: pointer;
        border-right: 1px solid var(--cg-border);
        white-space: nowrap;
        user-select: none;
        color: var(--cg-muted);
      }

      .tab:hover {
        background: var(--cg-hover);
      }

      .tab-active {
        background: var(--cg-bg);
        color: var(--cg-fg);
        font-weight: 500;
      }

      .tab-label {
        pointer-events: none;
      }

      .tab-dirty {
        color: var(--cg-fg);
        font-size: 16px;
        line-height: 1;
      }

      .tab-close {
        font-size: 14px;
        line-height: 1;
        padding: 0 2px;
        border-radius: 2px;
        color: var(--cg-muted);
      }

      .tab-close:hover {
        background: var(--cg-active);
        color: var(--cg-fg);
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        min-width: 180px;
        background: var(--cg-subtle);
        border-right: 1px solid var(--cg-border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--cg-muted);
        border-bottom: 1px solid var(--cg-border);
      }

      .sidebar-btn {
        background: none;
        border: 1px solid var(--cg-border);
        border-radius: 2px;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 2px 6px;
        color: var(--cg-muted);
      }

      .sidebar-btn:hover {
        background: var(--cg-hover);
        color: var(--cg-fg);
      }

      /* File tree */
      .file-tree {
        overflow-y: auto;
        flex: 1;
        padding: 4px 0;
      }

      .file-tree-item {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        color: var(--cg-fg);
      }

      .file-tree-item:hover {
        background: var(--cg-hover);
      }

      .file-tree-active {
        background: var(--cg-active);
        color: var(--cg-fg);
      }

      .file-tree-icon {
        font-size: 10px;
        width: 12px;
        text-align: center;
        flex-shrink: 0;
      }

      .file-tree-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-tree-directory {
        font-weight: 500;
      }

      .file-tree-children {
        /* controlled by JS */
      }

      /* Collapsible sidebar sections */
      .sidebar-section {
        border-top: 1px solid var(--cg-border);
      }

      .sidebar-header-collapsible {
        cursor: pointer;
        user-select: none;
        gap: 4px;
      }

      .sidebar-toggle {
        font-size: 8px;
        color: var(--cg-muted);
        width: 10px;
        flex-shrink: 0;
      }

      .sidebar-section-body {
        /* toggleable via JS */
      }

      /* Outline */
      .outline-list {
        overflow-y: auto;
        padding: 4px 0;
        max-height: 300px;
      }

      .outline-item {
        display: flex;
        align-items: baseline;
        gap: 4px;
        padding: 2px 8px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        color: var(--cg-fg);
        line-height: 1.4;
      }

      .outline-item:hover {
        background: var(--cg-hover);
      }

      .outline-toggle {
        font-size: 8px;
        color: var(--cg-muted);
        width: 10px;
        flex-shrink: 0;
        cursor: pointer;
        text-align: center;
      }

      .outline-toggle:hover {
        color: var(--cg-fg);
      }

      .outline-toggle-spacer {
        cursor: default;
      }

      .outline-number {
        color: var(--cg-muted);
        font-size: 11px;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }

      .outline-text {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Outline active state */
      .outline-item-active {
        background: var(--cg-active);
        color: var(--cg-fg);
      }

      .outline-item-active:hover {
        background: var(--cg-active);
      }

      /* Breadcrumb bar */
      .breadcrumb-bar {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 4px 12px;
        font-size: 12px;
        color: var(--cg-muted);
        background: var(--cg-bg);
        border-bottom: 1px solid var(--cg-border);
        min-height: 24px;
        overflow: hidden;
        white-space: nowrap;
      }

      .breadcrumb-bar-empty {
        display: none;
      }

      .breadcrumb-separator {
        color: var(--cg-border);
        margin: 0 2px;
        flex-shrink: 0;
      }

      .breadcrumb-segment {
        cursor: pointer;
        color: var(--cg-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-radius: 2px;
        padding: 1px 4px;
      }

      .breadcrumb-segment:hover {
        background: var(--cg-hover);
        color: var(--cg-fg);
      }

      .breadcrumb-segment:last-child {
        color: var(--cg-fg);
        font-weight: 500;
      }

      /* Command palette */
      .cmd-palette-overlay {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        justify-content: center;
        padding-top: 80px;
      }

      .cmd-palette-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.2);
      }

      .cmd-palette-panel {
        position: relative;
        width: 480px;
        max-width: 90vw;
        max-height: 400px;
        background: var(--cg-bg);
        border: 1px solid var(--cg-border);
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 1;
      }

      .cmd-palette-input {
        width: 100%;
        padding: 12px 16px;
        font-size: 16px;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        border: none;
        border-bottom: 1px solid var(--cg-border);
        outline: none;
        background: transparent;
        color: var(--cg-fg);
      }

      .cmd-palette-input::placeholder {
        color: var(--cg-muted);
      }

      .cmd-palette-results {
        overflow-y: auto;
        flex: 1;
        padding: 4px 0;
      }

      .cmd-palette-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 14px;
        color: var(--cg-fg);
      }

      .cmd-palette-item:hover,
      .cmd-palette-item-active {
        background: var(--cg-hover);
      }

      .cmd-palette-item-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cmd-palette-item-shortcut {
        flex-shrink: 0;
        margin-left: 16px;
        font-size: 12px;
        color: var(--cg-muted);
        font-family: "SF Mono", "Fira Code", monospace;
        background: var(--cg-subtle);
        padding: 2px 6px;
        border-radius: 2px;
        border: 1px solid var(--cg-border);
      }

      /* Preferences dialog */
      .prefs-overlay {
        position: fixed;
        inset: 0;
        z-index: 3000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.35);
      }

      .prefs-overlay[hidden] {
        display: none;
      }

      .prefs-panel {
        width: 580px;
        max-width: 92vw;
        max-height: 80vh;
        background: var(--cg-bg);
        border: 1px solid var(--cg-border);
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      }

      .prefs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--cg-border);
        flex-shrink: 0;
      }

      .prefs-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--cg-fg);
      }

      .prefs-close {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: var(--cg-muted);
        padding: 2px 6px;
        border-radius: 3px;
        line-height: 1;
      }

      .prefs-close:hover {
        background: var(--cg-hover);
        color: var(--cg-fg);
      }

      .prefs-body {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .prefs-nav {
        width: 140px;
        flex-shrink: 0;
        border-right: 1px solid var(--cg-border);
        padding: 8px 0;
        display: flex;
        flex-direction: column;
        background: var(--cg-subtle);
      }

      .prefs-nav-item {
        background: none;
        border: none;
        cursor: pointer;
        text-align: left;
        padding: 8px 16px;
        font-size: 13px;
        color: var(--cg-fg);
        border-radius: 0;
      }

      .prefs-nav-item:hover {
        background: var(--cg-hover);
      }

      .prefs-nav-item-active {
        background: var(--cg-active);
        font-weight: 500;
      }

      .prefs-content {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }

      .prefs-tab {
        padding: 8px 0;
      }

      .prefs-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        gap: 16px;
      }

      .prefs-row:hover {
        background: var(--cg-subtle);
      }

      .prefs-row-label {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        cursor: pointer;
      }

      .prefs-row-name {
        font-size: 13px;
        color: var(--cg-fg);
        font-weight: 500;
      }

      .prefs-row-desc {
        font-size: 12px;
        color: var(--cg-muted);
      }

      .prefs-toggle {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        cursor: pointer;
        accent-color: var(--cg-fg);
      }

      .prefs-number {
        width: 80px;
        flex-shrink: 0;
        padding: 4px 8px;
        font-size: 13px;
        border: 1px solid var(--cg-border);
        border-radius: 3px;
        background: var(--cg-bg);
        color: var(--cg-fg);
        text-align: right;
      }

      .prefs-number:focus {
        outline: 2px solid var(--cg-fg);
        outline-offset: -1px;
      }

      .prefs-select {
        flex-shrink: 0;
        padding: 4px 8px;
        font-size: 13px;
        border: 1px solid var(--cg-border);
        border-radius: 3px;
        background: var(--cg-bg);
        color: var(--cg-fg);
        cursor: pointer;
        min-width: 100px;
      }

      .prefs-select:focus {
        outline: 2px solid var(--cg-fg);
        outline-offset: -1px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
