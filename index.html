<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chickenglass</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fafafa;
        color: #1a1a1a;
      }

      #app {
        display: flex;
        height: 100%;
      }

      #editor-container {
        flex: 1;
        overflow: hidden;
      }

      .cm-editor {
        height: 100%;
      }

      .cm-scroller {
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="editor-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
