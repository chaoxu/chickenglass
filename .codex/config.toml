# Codex project configuration for coflat

[agents]
# Workers share the filesystem — only one can branch at a time.
# Parallelism is safe only for read-only agents (explorer, reviewer).
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.worker]
config_file = "agents/worker.toml"
description = "Implementation agent with temp-clone isolation for focused tasks."

[agents.reviewer]
config_file = "agents/reviewer.toml"
description = "Read-only code review agent for commit and branch review."

[agents.explorer]
config_file = "agents/explorer.toml"
description = "Read-only codebase search agent for investigation and planning."
