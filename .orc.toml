solver = "codex"
reviewers = ["codex", "gemini"]
retries = 5

verify = [
  "npm ci",
  "npx tsc --noEmit",
  "npm run lint",
  "npm test",
]

accept = """
If the change affects rendering, CSS, decorations, themes, or layout:
  1. Pick random ports to avoid collisions with other agents:
       DEV_PORT=$((RANDOM % 10000 + 20000))
       CDP_PORT=$((RANDOM % 10000 + 30000))
  2. Start the dev server: npx vite --port $DEV_PORT &
  3. Wait for it: sleep 3
  4. Launch Chrome for Testing: npm run chrome -- --port $CDP_PORT --url http://localhost:$DEV_PORT &
  5. Wait for Chrome: sleep 2
  6. Write and run a Playwright script (node --input-type=module) that does:
       import { chromium } from "playwright";
       const browser = await chromium.connectOverCDP(`http://localhost:${CDP_PORT}`);
       const page = browser.contexts()[0]?.pages()[0];
       await page.waitForFunction(() => window.__cmDebug);
       await page.evaluate(() => __app.openFile("index.md"));
       await new Promise(r => setTimeout(r, 1000));
       const state = await page.evaluate(() => __cmDebug.dump());
       console.log(JSON.stringify(state, null, 2));
       // Check state.tree for correct block structure
       // Check state.fences for proper fence visibility
       await browser.close();
  7. Clean up: kill $(lsof -ti:$DEV_PORT) 2>/dev/null; kill $(lsof -ti:$CDP_PORT) 2>/dev/null
Otherwise the verify commands (typecheck, lint, test) are sufficient.
"""
